name: Deploy Supabase Edge Functions

on:
  push:
    branches:
      - main
    paths:
      - "supabase/functions/create-checkout-session/**"
      - "supabase/functions/payment-webhook/**"
      - "supabase/functions/_shared/**"
      - ".github/workflows/deploy-edge-functions.yml"
  workflow_dispatch:
    inputs:
      function:
        description: "Função específica para deploy (deixe em branco para todas)"
        required: false
        default: ""
        type: choice
        options:
          - ""
          - "create-checkout-session"
          - "payment-webhook"

concurrency:
  group: deploy-edge-functions-${{ github.ref }}
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy Edge Functions
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Validar secrets obrigatórias
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::SUPABASE_ACCESS_TOKEN não configurada nos GitHub Secrets."
            exit 1
          fi
          if [ -z "$SUPABASE_PROJECT_REF" ]; then
            echo "::error::SUPABASE_PROJECT_REF não configurada nos GitHub Secrets."
            exit 1
          fi
          echo "✅ Secrets validadas. Project ref: $SUPABASE_PROJECT_REF"

      - name: Instalar Supabase CLI
        uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Verificar versão da CLI
        run: supabase --version

      - name: Determinar funções a deployar
        id: functions
        run: |
          INPUT_FN="${{ github.event.inputs.function }}"
          if [ -n "$INPUT_FN" ]; then
            echo "list=$INPUT_FN" >> "$GITHUB_OUTPUT"
            echo "🎯 Deploy manual da função: $INPUT_FN"
          else
            echo "list=create-checkout-session payment-webhook" >> "$GITHUB_OUTPUT"
            echo "🚀 Deploy de todas as funções de pagamento"
          fi

      - name: Deploy das Edge Functions
        run: |
          set -euo pipefail
          for fn in ${{ steps.functions.outputs.list }}; do
            echo ""
            echo "═══════════════════════════════════════════════"
            echo "📦 Fazendo deploy: $fn"
            echo "═══════════════════════════════════════════════"
            supabase functions deploy "$fn" \
              --project-ref "$SUPABASE_PROJECT_REF" \
              --no-verify-jwt
            echo "✅ $fn deployada com sucesso"
          done

      - name: Resumo do deploy
        if: success()
        run: |
          echo "### ✅ Deploy concluído com sucesso" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Projeto Supabase:** \`$SUPABASE_PROJECT_REF\`" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Funções deployadas:**" >> "$GITHUB_STEP_SUMMARY"
          for fn in ${{ steps.functions.outputs.list }}; do
            echo "- \`$fn\` → https://supabase.com/dashboard/project/$SUPABASE_PROJECT_REF/functions/$fn" >> "$GITHUB_STEP_SUMMARY"
          done

      - name: Falha no deploy
        if: failure()
        run: |
          echo "### ❌ Falha no deploy" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "Verifique:" >> "$GITHUB_STEP_SUMMARY"
          echo "1. \`SUPABASE_ACCESS_TOKEN\` válido (gere em https://supabase.com/dashboard/account/tokens)" >> "$GITHUB_STEP_SUMMARY"
          echo "2. \`SUPABASE_PROJECT_REF\` correto (ex: \`auhwylnhqmdgphsvjszr\`)" >> "$GITHUB_STEP_SUMMARY"
          echo "3. Logs da CLI acima para detalhes" >> "$GITHUB_STEP_SUMMARY"
